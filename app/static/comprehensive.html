<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>綜合整理 — 柴柴法人部位彙整</title>
<style>
  /* Mirror Excel 「綜合整理」 sheet exactly:
     - no borders, no fill, no zebra
     - 標楷體 sz 12 (~16px), color theme1 (black), no bold
     - frozen header (前 2 row)
     - column widths from sheet110 col definitions
     - numFmt per Excel: 千分位 + 紅色負括號 / 4-位小數百分比 / 2-位小數兆元
  */
  :root {
    --bg: #ffffff;
    --fg: #000000;
    --muted: #6b7280;
    --neg-text: #FF0000;
    --header-bg: #f1f5f9;
    --row-stripe: #fafafa;
  }
  * { box-sizing: border-box; }
  /* 頁面 layout: body 滿 viewport, no body scroll;
     .table-wrap 內部 scroll → sticky thead pins to wrap top correctly. */
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "DFKai-SB", "BiauKai", "標楷體", "Kaiti TC", "Kaiti SC", "Microsoft JhengHei", serif;
    font-size: 16px;
    font-weight: normal;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    font-size: 13px;
    background: #fff;
    flex-shrink: 0;     /* 固定高度, 不被 scroll 帶走 */
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header a { color: #2c5aa0; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  .table-wrap {
    padding: 10px 16px;
    box-sizing: border-box;
    flex: 1;             /* 填滿 viewport 剩下空間 */
    overflow-y: auto;    /* 內部 scroll, sticky pins 到 wrap 頂 */
    overflow-x: auto;
  }
  /* IMPORTANT: border-collapse:collapse breaks position:sticky on <th> in
     Chromium/Edge — thead scrolls away with rows. Must use separate + 0 spacing.
     Trade-off: borders no longer collapse so we draw on right+bottom only and
     let table's outer border close it off. */
  table.zonghe {
    border-collapse: separate;
    border-spacing: 0;
    margin: 0 auto;
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    table-layout: fixed;
    border-left: 1px solid #d0d0d0;
    border-top: 1px solid #d0d0d0;
  }
  table.zonghe th, table.zonghe td {
    padding: 3px 5px;
    white-space: nowrap;
    text-align: right;
    font-weight: normal;
    color: var(--fg);
    background: #fff;
    border-right: 1px solid #d0d0d0;
    border-bottom: 1px solid #d0d0d0;
  }
  table.zonghe thead th {
    background: var(--header-bg);
    color: var(--fg);
    text-align: center;
    border-right: 1px solid #888;
    border-bottom: 1px solid #888;
    position: sticky;
    z-index: 3;
  }
  table.zonghe thead tr:nth-child(1) th { top: 0; z-index: 4; }
  table.zonghe thead tr:nth-child(2) th {
    top: var(--r1-height, 22px);  /* JS measures real R1 height after render */
    z-index: 3;
  }
  /* Excel has no zebra stripe — pure white. Hover only for navigation help. */
  table.zonghe tbody tr:hover td { background: #fff7d6; }

  /* Negative values get red — qualify selector to beat .zonghe td { color } (0,1,2) */
  table.zonghe td.neg { color: var(--neg-text); }
  /* col widths via <colgroup> — 確保 group 下的 上市/上櫃 sub-col 等寬 */
  table.zonghe { table-layout: fixed; }
</style>
</head>
<body>
<header>
  <h1>綜合整理</h1>
  <span style="color:var(--muted)">柴柴 — 期交所法人部位彙整 ‧ 全部歷史</span>
  <span style="margin-left:auto"><a href="/">← 回主表 (For 開盤前看)</a></span>
</header>

<div class="table-wrap">
  <table class="zonghe" id="zonghe">
    <colgroup>
      <col style="width:6%">    <!-- A: For 開盤前看 -->
      <col style="width:6%">    <!-- B: 前一日日盤Data -->
      <col style="width:5%">    <!-- C: 加權指數 -->
      <col style="width:5%">    <!-- D: 台指期 日盤收盤 -->
      <col style="width:6%">    <!-- E: 台指期 法人淨部位 -->
      <col style="width:6%">    <!-- F: 台指期 開盤前多空 -->
      <col style="width:6%">    <!-- G: CALL -->
      <col style="width:6%">    <!-- H: PUT -->
      <col style="width:6%">    <!-- I: CP -->
      <col style="width:6%">    <!-- J: 選擇權 開盤前多空 -->
      <col style="width:6%">    <!-- K: 股票期貨 -->
      <col style="width:5%">    <!-- L: 上市佔比 -->
      <col style="width:5%">    <!-- M: 上櫃佔比 -->
      <col style="width:5%">    <!-- N: 上市億 -->
      <col style="width:5%">    <!-- O: 上櫃億 -->
      <col style="width:5%">    <!-- P: 上市兆 -->
      <col style="width:5%">    <!-- Q: 上櫃兆 -->
    </colgroup>
    <thead>
      <!-- R1: group header.
           「指數收盤」 colspan=2 (加權指數 + 台指期日盤收盤)
           「台指期」 colspan=2 (法人淨部位 + 開盤前多空 = 大台等效 OI+夜盤)
           「選擇權未平倉」 colspan=4 (CALL / PUT / CP / 開盤前多空 = CP+夜盤)
      -->
      <tr>
        <th></th>
        <th></th>
        <th colspan="2">指數收盤</th>
        <th colspan="2">台指期</th>
        <th colspan="4">選擇權未平倉</th>
        <th>股票期貨</th>
        <th colspan="2">融資餘額佔市值比</th>
        <th colspan="2">融資餘額</th>
        <th colspan="2">總市值</th>
      </tr>
      <!-- R2: column header (17 cells, full row) -->
      <tr>
        <th>For 開盤前看</th>
        <th>前一日日盤Data</th>
        <th>加權指數</th>
        <th>台指期</th>
        <th>法人淨部位</th>
        <th>開盤前多空</th>
        <th>法人買權CALL</th>
        <th>法人賣權PUT</th>
        <th>法人CP合計多空</th>
        <th>開盤前多空</th>
        <th>法人淨部位</th>
        <th>上市</th>
        <th>上櫃</th>
        <th>上市(億元)</th>
        <th>上櫃(億元)</th>
        <th>上市(兆元)</th>
        <th>上櫃(兆元)</th>
      </tr>
    </thead>
    <tbody id="zhBody">
      <tr><td colspan="17" style="text-align:center;color:var(--muted);padding:30px">(載入中…)</td></tr>
    </tbody>
  </table>
</div>

<script>
"use strict";

const MD_DAY = ["日","一","二","三","四","五","六"];
function fmtMD(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-").map(Number);
  const w = new Date(iso + "T00:00:00").getDay();
  return `${y}/${m}/${d}(${MD_DAY[w]})`;   // 帶年份
}

// numFmt mirror Excel:
// 千分位 + 紅色負括號 (Excel #,##0_);[Red](#,##0))
function fmtParenInt(v) {
  if (v == null || isNaN(v)) return "";
  const n = Math.round(v);
  if (n < 0) return "(" + Math.abs(n).toLocaleString("en-US") + ")";
  return n.toLocaleString("en-US") + '<span style="visibility:hidden">)</span>';
}
// 千分位（無括號，台指期日盤收盤用）— numFmt #,##0_
function fmtPlainInt(v) {
  if (v == null || isNaN(v)) return "";
  const n = Math.round(v);
  return n.toLocaleString("en-US");
}
// 加權指數: 千分位 + 2 位小數
function fmtTwii(v) {
  if (v == null || isNaN(v)) return "";
  return v.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function tdTwii(v) {
  if (v == null) return "<td></td>";
  return `<td>${fmtTwii(v)}</td>`;
}
// 4-位小數百分比 — Excel 0.0000%
function fmtPct(v) {
  if (v == null || isNaN(v)) return "";
  return (v * 100).toFixed(4) + "%";
}
// 2-位小數，紅色負括號 (兆元用)
function fmtParen2(v) {
  if (v == null || isNaN(v)) return "";
  const sign = v < 0 ? "(" : "";
  const close = v < 0 ? ")" : '<span style="visibility:hidden">)</span>';
  return sign + Math.abs(v).toFixed(2) + close;
}
// Accounting format, 千分位 (融資餘額億元 — 通常正數，no paren needed)
function fmtAccountingInt(v) {
  if (v == null || isNaN(v)) return "";
  return Math.round(v).toLocaleString("en-US");
}

function tdParenInt(v) {
  if (v == null) return "<td></td>";
  const cls = v < 0 ? " class=neg" : "";
  return `<td${cls}>${fmtParenInt(v)}</td>`;
}
function tdPlainInt(v) {
  if (v == null) return "<td></td>";
  const cls = v < 0 ? " class=neg" : "";
  return `<td${cls}>${fmtPlainInt(v)}</td>`;
}
function tdPct(v) {
  if (v == null) return "<td></td>";
  const cls = v < 0 ? " class=neg" : "";
  return `<td${cls}>${fmtPct(v)}</td>`;
}
function tdParen2(v) {
  if (v == null) return "<td></td>";
  const cls = v < 0 ? " class=neg" : "";
  return `<td${cls}>${fmtParen2(v)}</td>`;
}
function tdAcct(v) {
  if (v == null) return "<td></td>";
  const cls = v < 0 ? " class=neg" : "";
  return `<td${cls}>${fmtAccountingInt(v)}</td>`;
}

function syncStickyOffset() {
  // Measure R1 height after render so R2 sticks exactly under it (no gap, no overlap).
  const r1 = document.querySelector("table.zonghe thead tr:nth-child(1) th");
  if (!r1) return;
  const h = r1.getBoundingClientRect().height;
  document.documentElement.style.setProperty("--r1-height", h + "px");
}

async function load() {
  const r = await fetch("/api/comprehensive").then(r => r.json());
  const rows = r.rows || [];
  if (!rows.length) {
    document.getElementById("zhBody").innerHTML =
      `<tr><td colspan="16" style="text-align:center;color:var(--muted);padding:30px">(無資料)</td></tr>`;
    return;
  }
  // Reverse (newest first) so latest 日期在最上
  rows.reverse();
  const html = rows.map(r => `
    <tr>
      <td style="text-align:left">${fmtMD(r.view_date)}</td>
      <td style="text-align:left">${fmtMD(r.date)}</td>
      ${tdTwii(r.twii_close)}
      ${tdPlainInt(r.tx_close)}
      ${tdParenInt(r.op_legal_net)}
      ${tdParenInt(r.fut_pre_open_net)}
      ${tdParenInt(r.op_call_net)}
      ${tdParenInt(r.op_put_net)}
      ${tdParenInt(r.op_cp_net)}
      ${tdParenInt(r.op_pre_open_cp_net)}
      ${tdParenInt(r.stock_fut_legal_net)}
      ${tdPct(r.twse_margin_pct)}
      ${tdPct(r.tpex_margin_pct)}
      ${tdAcct(r.twse_margin_amt_oku)}
      ${tdAcct(r.tpex_margin_amt_oku)}
      ${tdParen2(r.twse_mkt_cap_chao)}
      ${tdParen2(r.tpex_mkt_cap_chao)}
    </tr>
  `).join("");
  document.getElementById("zhBody").innerHTML = html;
  requestAnimationFrame(syncStickyOffset);
}

window.addEventListener("resize", syncStickyOffset);
load();
</script>
</body>
</html>
