<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>走勢圖</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
  :root { --bg: #ffffff; --fg: #000000; --muted: #6b7280; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    font-size: 13px;
    display: flex; flex-direction: column;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid #ddd;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header span.muted { color: var(--muted); font-size: 13px; }
  /* category dropdown — 取代靜態 h1 */
  .category-select {
    font-size: 16px; font-weight: 600;
    padding: 6px 10px; border: 1px solid #ccc;
    border-radius: 4px; background: #fff;
    cursor: pointer; color: var(--fg);
  }
  .category-select:hover { border-color: #2c5aa0; }
  .nav-btn {
    display: inline-block;
    background: #fff; color: #2c5aa0;
    border: 2px solid #2c5aa0;
    padding: 5px 14px; border-radius: 4px;
    text-decoration: none; font-weight: 600; font-size: 13px;
    margin-left: auto;
  }
  .nav-btn:hover { background: #2c5aa0; color: #fff; }

  /* mode toggle button bar */
  .mode-bar { display: flex; gap: 4px; margin-left: 12px; }
  .mode-btn {
    background: #f5f5f5; border: 1px solid #ccc;
    padding: 5px 12px; cursor: pointer; font-size: 12px;
    border-radius: 3px; color: #333;
  }
  .mode-btn:hover { background: #e8e8e8; }
  .mode-btn.active {
    background: #2c5aa0; color: #fff; border-color: #2c5aa0; font-weight: 600;
  }

  #chartArea {
    flex: 1;
    padding: 16px;
    min-height: 0;
    overflow: hidden;
    display: flex;
  }
  /* layout containers, switched by mode */
  .layout-stacked { flex-direction: column; gap: 12px; }
  .layout-single  { flex-direction: column; }
  .panel { flex: 1 1 0; min-height: 0; min-width: 0; position: relative; }
  .panel-title {
    position: absolute; top: 4px; left: 12px;
    font-size: 12px; color: var(--muted); font-weight: 600;
    pointer-events: none; z-index: 2;
  }

  .legend {
    display: flex; gap: 18px;
    padding: 6px 16px;
    border-bottom: 1px solid #eee;
    background: #fafafa; align-items: center; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-color { width: 12px; height: 12px; border-radius: 2px; }
  .legend-color.dashed {
    background: repeating-linear-gradient(45deg, currentColor 0 4px, transparent 4px 8px);
  }
  .hint { color: var(--muted); margin-left: auto; font-size: 12px; }
</style>
</head>
<body>
<header>
  <select id="categorySelect" class="category-select">
    <option value="margin">融資餘額佔市值比 + 指數</option>
    <option value="stock_fut">股票期貨 法人淨部位</option>
  </select>
  <span class="muted">走勢圖 · 2020-01-02 ~ today</span>
  <div class="mode-bar" id="modeBar">
    <button class="mode-btn active" data-mode="stacked">A · 上下雙圖</button>
    <button class="mode-btn"        data-mode="original">B · 純融資%</button>
    <button class="mode-btn"        data-mode="scatter">C · 散佈圖</button>
  </div>
  <a href="/comprehensive" class="nav-btn">← 回綜合整理</a>
</header>

<div class="legend" id="legend"></div>
<div id="chartArea" class="layout-stacked"></div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
"use strict";

// ── 顏色 / style 約定 ──
// 上市 (TWSE): 紅 #dc2626
// 加權指數:    暗紅 #991b1b, 虛線
// 上櫃 (TPEX): 藍 #2563eb
// OTC 指數:    暗藍 #1e3a8a, 虛線
const COLOR = {
  twseMargin: "#dc2626",
  twii:       "#991b1b",
  tpexMargin: "#2563eb",
  otcIdx:     "#1e3a8a",
  stockFut:   "#7c3aed",  // 紫, 跟融資紅藍區分
  txClose:    "#dc2626",  // 紅 (台指期/加權同 family — stock_fut category 內不衝突)
  basis:      "#ea580c",  // 橘, 期現價差
};

let plots = [];   // 目前活著的 uPlot instances (resize 用)
let DATA = null;  // { xs, twseMargin, tpexMargin, twii, otc, dataMin, dataMax }

function destroyPlots() {
  for (const u of plots) try { u.destroy(); } catch {}
  plots = [];
}

function attachWheelZoom(plot, dataMin, dataMax) {
  plot.over.addEventListener("wheel", (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 0.85 : 1.18;
    const xMin = plot.scales.x.min, xMax = plot.scales.x.max;
    const rect = plot.over.getBoundingClientRect();
    const cursorVal = plot.posToVal(e.clientX - rect.left, "x");
    let newMin = cursorVal - (cursorVal - xMin) * factor;
    let newMax = cursorVal + (xMax - cursorVal) * factor;
    if (newMin < dataMin) newMin = dataMin;
    if (newMax > dataMax) newMax = dataMax;
    if (newMin >= newMax) { newMin = dataMin; newMax = dataMax; }
    plot.setScale("x", { min: newMin, max: newMax });
  }, { passive: false });
  plot.over.addEventListener("dblclick", () => {
    plot.setScale("x", { min: dataMin, max: dataMax });
  });
}

// X-axis date formatter (shared)
const xAxisVals = (u, vals) => vals.map(v => {
  const d = new Date(v * 1000);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
});

// 計算 panel size — chartArea 父元素已 layout, 直接量 + 按 mode 切
function getPanelSize(mode) {
  const area = document.getElementById("chartArea");
  // chartArea 有 padding 16, gap 12 between panels
  const w = Math.max(100, area.clientWidth  - 32);
  const h = Math.max(100, area.clientHeight - 32);
  if (mode === "stockfut3")  return { w, h: Math.floor((h - 24) / 3) };  // 3 panel, 2 個 gap
  if (mode === "stacked")    return { w, h: Math.floor((h - 12) / 2) };
  return { w, h };
}

// 通用: 雙 Y 軸 panel (左 = 指數, 右 = 融資%)
function makeDualPanel(container, title, size, xs, idxData, pctData, idxColor, pctColor, idxLabel, pctLabel) {
  const panel = document.createElement("div");
  panel.className = "panel";
  if (title) {
    const t = document.createElement("div");
    t.className = "panel-title"; t.textContent = title;
    panel.appendChild(t);
  }
  container.appendChild(panel);

  const opts = {
    width: size.w, height: size.h,
    legend: { show: false },  // 關 uPlot 內建 legend (我們在 header 下自繪)
    cursor: { drag: { x: true, y: false, setScale: true } },
    scales: {
      x: { time: true },
      idx: { auto: true },
      pct: { auto: true },
    },
    axes: [
      { values: xAxisVals },
      { scale: "idx", stroke: idxColor,
        values: (u, vs) => vs.map(v => v.toLocaleString("en-US", {maximumFractionDigits:0})),
        size: 60 },
      { side: 1, scale: "pct", stroke: pctColor,
        values: (u, vs) => vs.map(v => v.toFixed(2) + "%"),
        size: 60, grid: { show: false } },
    ],
    series: [
      {},
      { label: idxLabel, scale: "idx", stroke: idxColor, width: 1.2,
        dash: [6, 4],
        value: (u, v) => v == null ? "" : v.toLocaleString("en-US", {maximumFractionDigits:2}) },
      { label: pctLabel, scale: "pct", stroke: pctColor, width: 1.5,
        value: (u, v) => v == null ? "" : v.toFixed(4) + "%" },
    ],
  };
  const u = new uPlot(opts, [xs, idxData, pctData], panel);
  attachWheelZoom(u, DATA.dataMin, DATA.dataMax);
  plots.push(u);
}

// Mode A: 上下兩 panel
function renderStacked() {
  const area = document.getElementById("chartArea");
  area.className = "layout-stacked";
  area.innerHTML = "";
  const size = getPanelSize("stacked");
  makeDualPanel(area, "上市 (加權指數 + 融資%)", size,
    DATA.xs, DATA.twii, DATA.twseMargin,
    COLOR.twii, COLOR.twseMargin,
    "加權指數", "上市融資%");
  makeDualPanel(area, "上櫃 (OTC指數 + 融資%)", size,
    DATA.xs, DATA.otc, DATA.tpexMargin,
    COLOR.otcIdx, COLOR.tpexMargin,
    "OTC指數", "上櫃融資%");
}

// 純 % 對比 (兩條 line, dual axis, no 指數)
function renderOriginal() {
  const area = document.getElementById("chartArea");
  area.className = "layout-single";
  area.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "panel";
  area.appendChild(panel);
  const size = getPanelSize("original");
  const opts = {
    width: size.w, height: size.h,
    legend: { show: false },  // 關 uPlot 內建 legend (我們在 header 下自繪)
    cursor: { drag: { x: true, y: false, setScale: true } },
    scales: { x: { time: true }, twse: { auto: true }, tpex: { auto: true } },
    axes: [
      { values: xAxisVals },
      { scale: "twse", stroke: COLOR.twseMargin, size: 70,
        values: (u, vs) => vs.map(v => v.toFixed(2) + "%") },
      { side: 1, scale: "tpex", stroke: COLOR.tpexMargin, size: 70,
        values: (u, vs) => vs.map(v => v.toFixed(2) + "%"), grid: { show: false } },
    ],
    series: [
      {},
      { label: "上市 TWSE", scale: "twse", stroke: COLOR.twseMargin, width: 1.5,
        value: (u, v) => v==null?"":v.toFixed(4)+"%" },
      { label: "上櫃 TPEX", scale: "tpex", stroke: COLOR.tpexMargin, width: 1.5,
        value: (u, v) => v==null?"":v.toFixed(4)+"%" },
    ],
  };
  const u = new uPlot(opts, [DATA.xs, DATA.twseMargin, DATA.tpexMargin], panel);
  attachWheelZoom(u, DATA.dataMin, DATA.dataMax);
  plots.push(u);
}

function pearsonR(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((a,b)=>a+b)/n;
  const my = ys.reduce((a,b)=>a+b)/n;
  let num=0, dx=0, dy=0;
  for (let i = 0; i < n; i++) {
    num += (xs[i]-mx) * (ys[i]-my);
    dx  += (xs[i]-mx) ** 2;
    dy  += (ys[i]-my) ** 2;
  }
  return num / Math.sqrt(dx * dy);
}

// Mode C: 散佈圖 — 兩 panel, 自繪 canvas, 含 Pearson r
function drawScatterPanel(container, title, size, xData, yData, color) {
  const panel = document.createElement("div");
  panel.className = "panel";
  panel.style.width = size.w + "px";
  panel.style.height = size.h + "px";
  if (title) {
    const t = document.createElement("div");
    t.className = "panel-title"; t.textContent = title;
    panel.appendChild(t);
  }
  const canvas = document.createElement("canvas");
  canvas.width = size.w; canvas.height = size.h;
  panel.appendChild(canvas);
  container.appendChild(panel);

  const ctx = canvas.getContext("2d");
  const M = { l: 70, r: 16, t: 32, b: 36 };
  const W = size.w - M.l - M.r, H = size.h - M.t - M.b;
  const points = xData.map((x, i) => [x, yData[i]])
                      .filter(([x, y]) => x != null && y != null);
  if (!points.length) return;
  const xs = points.map(p => p[0]), ys = points.map(p => p[1]);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);

  ctx.font = "11px sans-serif";
  ctx.fillStyle = "#666";
  ctx.strokeStyle = "#eee";
  for (let i = 0; i <= 5; i++) {
    const py = M.t + H * (1 - i / 5);
    const yval = yMin + (yMax - yMin) * i / 5;
    ctx.textAlign = "right";
    ctx.fillText(yval.toFixed(2) + "%", M.l - 6, py + 4);
    ctx.beginPath(); ctx.moveTo(M.l, py); ctx.lineTo(M.l + W, py); ctx.stroke();
  }
  for (let i = 0; i <= 6; i++) {
    const px = M.l + W * i / 6;
    const xval = xMin + (xMax - xMin) * i / 6;
    ctx.textAlign = "center";
    ctx.fillText(xval.toLocaleString("en-US", {maximumFractionDigits: 0}), px, M.t + H + 18);
  }
  ctx.strokeStyle = "#888";
  ctx.beginPath();
  ctx.moveTo(M.l, M.t); ctx.lineTo(M.l, M.t + H); ctx.lineTo(M.l + W, M.t + H);
  ctx.stroke();

  // 點: 時間 alpha gradient (淡 → 濃 = 早 → 晚)
  for (let i = 0; i < points.length; i++) {
    const [x, y] = points[i];
    const px = M.l + (x - xMin) / (xMax - xMin) * W;
    const py = M.t + (1 - (y - yMin) / (yMax - yMin)) * H;
    const alpha = 0.15 + 0.55 * (i / points.length);
    ctx.fillStyle = color + Math.round(alpha * 255).toString(16).padStart(2, "0");
    ctx.beginPath();
    ctx.arc(px, py, 2.2, 0, 2 * Math.PI);
    ctx.fill();
  }

  // r → 白話: 弱相關時不加方向 (太接近 0 時 + / - 沒實質意義)
  const r = pearsonR(xs, ys);
  const absR = Math.abs(r);
  let verdict;
  if (absR < 0.3)      verdict = "幾乎不相關 (指數漲跌跟融資% 沒對應)";
  else if (absR < 0.6) verdict = r > 0 ? "中度同步 (指數漲, 融資% 多半也漲)" : "中度反向";
  else                 verdict = r > 0 ? "強同步 (指數跟融資% 大致一起動)"  : "強反向 (指數漲時融資% 反而跌)";

  ctx.fillStyle = color;
  ctx.font = "bold 13px sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(`同步度 ${r.toFixed(2)} → ${verdict}`,
               M.l + W - 8, M.t + 18);
  ctx.fillStyle = "#666";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(`(n=${points.length}, 範圍 -1 反向 ~ 0 無關 ~ +1 同步)`,
               M.l + W - 8, M.t + 32);
  ctx.textAlign = "left";
  ctx.fillText("● 點顏色: 淡 = 早 (2020), 濃 = 近 (2026)", M.l + 4, M.t + 18);
}

function renderScatter() {
  const area = document.getElementById("chartArea");
  area.className = "layout-stacked";
  area.innerHTML = "";
  const size = getPanelSize("stacked");
  drawScatterPanel(area, "上市: 加權指數 (X) vs 上市融資% (Y)",
                   size, DATA.twii, DATA.twseMargin, COLOR.twseMargin);
  drawScatterPanel(area, "上櫃: OTC指數 (X) vs 上櫃融資% (Y)",
                   size, DATA.otc, DATA.tpexMargin, COLOR.tpexMargin);
}

// Generic 單軸 line panel (含 optional 0 reference line)
function makeLinePanel(container, title, size, xs, ys, color, unit, withZero) {
  const panel = document.createElement("div");
  panel.className = "panel";
  if (title) {
    const t = document.createElement("div");
    t.className = "panel-title"; t.textContent = title;
    panel.appendChild(t);
  }
  container.appendChild(panel);

  const opts = {
    width: size.w, height: size.h,
    legend: { show: false },
    cursor: { drag: { x: true, y: false, setScale: true } },
    scales: { x: { time: true }, y: { auto: true } },
    axes: [
      { values: xAxisVals },
      { scale: "y", stroke: "#444", size: 80,
        values: (u, vs) => vs.map(v => v.toLocaleString("en-US", {maximumFractionDigits: 0})) },
    ],
    series: [
      {},
      { label: title, scale: "y",
        stroke: color, width: 1.3,
        value: (u, v) => v == null ? ""
          : v.toLocaleString("en-US", {maximumFractionDigits: 0}) + (unit ? " " + unit : "") },
    ],
  };
  if (withZero) {
    opts.hooks = {
      drawAxes: [(u) => {
        const yZero = u.valToPos(0, "y", true);
        if (yZero >= u.bbox.top && yZero <= u.bbox.top + u.bbox.height) {
          const ctx = u.ctx;
          ctx.save();
          ctx.strokeStyle = "#888";
          ctx.lineWidth = 1.2;
          ctx.setLineDash([5, 4]);
          ctx.beginPath();
          ctx.moveTo(u.bbox.left, yZero);
          ctx.lineTo(u.bbox.left + u.bbox.width, yZero);
          ctx.stroke();
          ctx.restore();
        }
      }],
    };
  }
  const u = new uPlot(opts, [xs, ys], panel);
  attachWheelZoom(u, DATA.dataMinAll, DATA.dataMaxAll);
  plots.push(u);
}

// Category: stock_fut — 3 stacked panel (股期淨部位 / 台指期收盤 / 期現價差)
function renderStockFut() {
  const area = document.getElementById("chartArea");
  area.className = "layout-stacked";
  area.innerHTML = "";
  const size = getPanelSize("stockfut3");
  makeLinePanel(area, "股期法人淨部位 (口) — 外資+自營商, 0 線虛灰",
    size, DATA.xsAll, DATA.stockFut, COLOR.stockFut, "口", true);
  makeLinePanel(area, "台指期 近月收盤 (點)",
    size, DATA.xsAll, DATA.txClose, COLOR.txClose, "點", false);
  makeLinePanel(area, "台指期 - 加權指數 價差 (點) — > 0 升水, < 0 貼水",
    size, DATA.xsAll, DATA.basis, COLOR.basis, "點", true);
}

const RENDER = {
  stacked:  renderStacked,
  original: renderOriginal,
  scatter:  renderScatter,
};

const LEGENDS = {
  stacked:  [["twii","加權指數 (虛)"], ["twseMargin","上市融資%"], ["otcIdx","OTC指數 (虛)"], ["tpexMargin","上櫃融資%"]],
  original: [["twseMargin","上市 TWSE"], ["tpexMargin","上櫃 TPEX"]],
  scatter:  [["twseMargin","上市點 (X=加權, Y=融資%)"], ["tpexMargin","上櫃點 (X=OTC, Y=融資%)"]],
  stockfut: [
    ["stockFut", "股期法人淨部位 (口)"],
    ["txClose",  "台指期 近月收盤 (點)"],
    ["basis",    "期現價差 = 台指期 - 加權 (點)"],
  ],
};

function renderLegend(mode) {
  const el = document.getElementById("legend");
  const items = LEGENDS[mode] || [];
  el.innerHTML = items.map(([k, label]) => {
    const isDash = label.includes("虛") || (mode === "combined" && (k === "twii" || k === "otcIdx"));
    const sw = isDash
      ? `<span class="legend-color dashed" style="color:${COLOR[k]}"></span>`
      : `<span class="legend-color" style="background:${COLOR[k]}"></span>`;
    return `<span class="legend-item">${sw}<span>${label}</span></span>`;
  }).join("") + `<span class="hint">滑鼠滾輪 zoom · 拖曳框選 zoom · 雙擊 reset</span>`;
}

function setMode(mode) {
  destroyPlots();
  document.querySelectorAll(".mode-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.mode === mode));
  renderLegend(mode);
  requestAnimationFrame(() => RENDER[mode]());
}

let CURRENT_CATEGORY = "margin";

function setCategory(cat) {
  CURRENT_CATEGORY = cat;
  const modeBar = document.getElementById("modeBar");
  destroyPlots();
  if (cat === "margin") {
    modeBar.style.display = "flex";
    const active = document.querySelector(".mode-btn.active");
    setMode(active ? active.dataset.mode : "stacked");
  } else if (cat === "stock_fut") {
    modeBar.style.display = "none";
    renderLegend("stockfut");
    requestAnimationFrame(() => renderStockFut());
  }
}

function handleResize() {
  if (CURRENT_CATEGORY === "stock_fut") {
    destroyPlots();
    requestAnimationFrame(() => renderStockFut());
  } else {
    const active = document.querySelector(".mode-btn.active");
    if (active) setMode(active.dataset.mode);
  }
}

async function init() {
  const r = await fetch("/api/comprehensive").then(r => r.json());
  const rows = (r.rows || []).filter(x =>
    x.twse_margin_pct != null && x.tpex_margin_pct != null
  );
  if (!rows.length) {
    document.getElementById("chartArea").textContent = "(無資料)";
    return;
  }
  const xs         = rows.map(x => Math.floor(new Date(x.date+"T00:00:00").getTime()/1000));
  const twseMargin = rows.map(x => x.twse_margin_pct * 100);
  const tpexMargin = rows.map(x => x.tpex_margin_pct * 100);
  const twii       = rows.map(x => x.twii_close);
  const otc        = rows.map(x => x.tpex_index_close);
  // stock_fut category 用 全部 rows (不 filter margin) — 股期/台指期 比 margin
  // 多覆蓋日期, 直接用 master row list
  const allRows  = (r.rows || []).slice();
  const xsAll    = allRows.map(x => Math.floor(new Date(x.date+"T00:00:00").getTime()/1000));
  const stockFut = allRows.map(x => x.stock_fut_legal_net);
  const txClose  = allRows.map(x => x.tx_close);
  // 期現價差 = 台指期收盤 - 加權指數收盤. 兩者皆 null → null
  const basis    = allRows.map(x =>
    (x.tx_close != null && x.twii_close != null) ? x.tx_close - x.twii_close : null);
  DATA = {
    xs, twseMargin, tpexMargin, twii, otc,
    xsAll, stockFut, txClose, basis,
    dataMin: xs[0], dataMax: xs[xs.length-1],
    dataMinAll: xsAll[0], dataMaxAll: xsAll[xsAll.length-1],
  };

  document.querySelectorAll(".mode-btn").forEach(b =>
    b.addEventListener("click", () => setMode(b.dataset.mode)));
  document.getElementById("categorySelect").addEventListener("change", (e) =>
    setCategory(e.target.value));
  window.addEventListener("resize", () => {
    clearTimeout(window._resizeT);
    window._resizeT = setTimeout(handleResize, 150);
  });

  setCategory("margin");  // default: 融資餘額 (= margin), 顯示 stacked mode
}

init();
</script>
</body>
</html>
