<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>柴柴 法人部位彙整</title>
<style>
  /* All values mirror Excel sheet109 (工作表2) R237-R245 cell-by-cell:
     fonts: theme1 (black), 標楷體, no bold anywhere
     fill colors: as exported from styles.xml
     borders: thick = 2px on outer + 4 section dividers + header bottom */
  :root {
    --bg: #f8f6f0;
    --panel: #ffffff;
    --for-corner-bg: #FABC00;        /* Excel A237 fill */
    --col-header-bg: #D7DFF2;        /* Excel R239 column-header fill */
    --product-zebra: #DCEBF5;        /* Excel fillId=11 (alt rows) */
    --night-update-bg: #FFC000;      /* Excel H238 「晚上9:00後」 marker */
    --fg: #000000;                   /* Excel theme1 */
    --muted: #6b7280;
    --neg-text: #FF0000;        /* Excel [Red] token = pure red */
    --border-thin: #b8b8b8;
    --border-thick: #1f1f1f;
    --cf-neg: #E1EEDB;               /* CF: 一般 row 口數<0 → 淡綠 */
    --cf-pos: #FBC9C6;               /* CF: 一般 row 口數>0 → 淡紅 */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "DFKai-SB", "BiauKai", "標楷體", "Kaiti TC", "Kaiti SC", "Microsoft JhengHei", serif;
    font-size: 19px;          /* 放大 — 表格寬高保持不變，靠收 cell padding 補空間 */
    font-weight: normal;
  }
  header {
    background: var(--panel);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border-thin);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    font-size: 13px;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header .meta { color: var(--muted); }
  button {
    background: #2c5aa0; color: #fff; border: 0;
    padding: 7px 14px; border-radius: 4px; cursor: pointer;
    font-weight: 600; font-size: 13px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type=date] {
    background: #fff; border: 1px solid var(--border-thin);
    padding: 5px 8px; border-radius: 3px;
    font-family: inherit;
  }
  main { padding: 18px; max-width: 1300px; margin: 0 auto; }

  /* ===== Excel-faithful summary table ===== */
  table.summary {
    border-collapse: collapse;
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border-thick);    /* outer thick */
    color: var(--fg);
  }
  table.summary th, table.summary td {
    border: 1px solid var(--border-thin);     /* inner thin */
    padding: 4px 8px;                          /* 收一點 padding 讓 row 不會跟著變高 */
    text-align: right;
    white-space: nowrap;
    font-weight: normal;                      /* Excel: no bold anywhere */
    color: var(--fg);                         /* black */
  }

  /* 4 vertical thick dividers: A|B  D|E  F|G  H|I */
  table.summary th.col-divider, table.summary td.col-divider {
    border-right: 2px solid var(--border-thick);
  }

  /* All header rows bottom = thick (R237 / R238 / R239 in Excel) */
  table.summary thead tr th { border-bottom: 2px solid var(--border-thick); }

  table.summary thead th {
    background: var(--col-header-bg);
    text-align: center;
  }
  table.summary thead th.title {
    background: #ffffff;        /* Excel B237 fill = none = white */
    font-size: 24px;            /* sz=16 → ~24px (略大於 body) */
    text-align: center;
    padding: 8px;
  }
  table.summary thead th.section {
    background: #ffffff;
  }

  /* 商品 label column — sz12 black, alternating fill (Excel fillId=0 / 11) */
  table.summary tbody td.product {
    text-align: center;
    color: var(--fg);
  }
  table.summary tbody tr:nth-child(2) td.product,
  table.summary tbody tr:nth-child(4) td.product,
  table.summary tbody tr:nth-child(6) td.product {
    background: var(--product-zebra);
  }

  /* Specificity fix: `table.summary td { color }` (0,1,2) was overriding
     `td.neg` (0,1,1). Qualify here to win. */
  table.summary td.neg { color: var(--neg-text); }
  td.empty { background: #ffffff; }

  table.summary th.preopen-col,
  table.summary td.preopen-col { background: #ffffff; }

  /* 融資餘額 panel — 主表下方獨立小字面板，上下排列、寬度 fit content */
  .margin-panel {
    margin: 14px 0 0;
    padding: 8px 14px;
    background: #ffffff;
    border: 1px solid var(--border-thin);
    border-radius: 4px;
    font-size: 18px;
    color: var(--fg);
    display: inline-flex;
    flex-direction: column;     /* 上下排列 */
    gap: 4px;
  }
  .margin-panel .m-title {
    font-weight: normal;
    border-bottom: 1px solid var(--border-thin);
    padding-bottom: 4px;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .margin-panel .m-row { white-space: nowrap; }
  .margin-panel .m-label { color: var(--muted); margin-right: 8px; font-size: 16px; }
  .margin-panel .m-value { font-weight: 600; }
  .margin-panel .m-unit { color: var(--muted); font-size: 15px; margin-left: 4px; }

  /* "For YYYY/MM/DD(週) 開盤前看" — Excel A237 橘黃 #FABC00.
     Selector specificity must beat `table.summary thead th` (=0,1,2) so we
     qualify with the same prefix → 0,1,3. */
  table.summary thead th.for-corner {
    background: var(--for-corner-bg);
    color: var(--fg);
    text-align: center;
    line-height: 1.5;
    padding: 10px 8px;
    border-right: 2px solid var(--border-thick);
    font-size: 19px;     /* match body */
  }
</style>
</head>
<body>

<header>
  <h1>柴柴 — 期交所法人部位彙整</h1>
  <span class="meta">For</span>
  <input type="date" id="viewDate">
  <span class="meta">開盤前看</span>
  <button id="btnRefresh">Refresh 抓最新</button>
  <div id="status">—</div>
</header>

<main>
  <table class="summary" id="mainTable">
    <colgroup>
      <col style="width:8%">     <!-- For corner / 商品 label -->
      <col style="width:9%">     <!-- 日盤口數 -->
      <col style="width:10%">    <!-- 日盤成本 -->
      <col style="width:8%">     <!-- 收盤價 -->
      <col style="width:13%">    <!-- 淨部位 (paren format, 較寬) -->
      <col style="width:10%">    <!-- 淨部位成本 -->
      <col style="width:9%">     <!-- 夜盤口數 -->
      <col style="width:10%">    <!-- 夜盤成本 -->
      <col style="width:13%">    <!-- 開盤前部位 (paren format, 較寬) -->
      <col style="width:10%">    <!-- 開盤前多空 (paren format) -->
    </colgroup>
    <thead>
      <tr>
        <th rowspan="3" class="for-corner" id="forCell">For<br>—<br>開盤前看</th>
        <th colspan="9" class="title">柴柴 — 期交所法人部位彙整</th>
      </tr>
      <tr>
        <th colspan="5" class="section col-divider" id="dayHeader">— 日盤</th>
        <th colspan="2" class="section col-divider" id="nightHeader">— 夜盤</th>
        <th class="preopen-col">開盤前部位</th>
        <th class="preopen-col">開盤前多空</th>
      </tr>
      <tr>
        <th>口數</th>
        <th>成本</th>
        <th class="col-divider">收盤價</th>
        <th>淨部位</th>
        <th class="col-divider">成本</th>
        <th>口數</th>
        <th class="col-divider">成本</th>
        <th class="preopen-col">&nbsp;</th>
        <th class="preopen-col">&nbsp;</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="10" style="text-align:center;color:var(--muted);padding:30px">(載入中…)</td></tr>
    </tbody>
  </table>

  <!-- 信用交易補充資訊 — 獨立 panel，標日期 follow Excel R190「115年MM月DD日 信用交易統計」 -->
  <div class="margin-panel" id="marginPanel">
    <div class="m-title" id="marginTitle">— 信用交易統計</div>
    <div class="m-row">
      <span class="m-label">上市融資餘額</span>
      <span class="m-value" id="twseMarginAmt">—</span>
      <span class="m-unit">億元</span>
    </div>
    <div class="m-row">
      <span class="m-label">上櫃融資餘額</span>
      <span class="m-value" id="tpexMarginAmt">—</span>
      <span class="m-unit">億元</span>
    </div>
  </div>

  <p style="color:var(--muted);font-size:13px;margin-top:14px;line-height:1.6;font-family:-apple-system,'Segoe UI','Microsoft JhengHei',sans-serif">
    <b>欄位說明：</b>「日盤口數」「淨部位」「夜盤口數」聚合三大法人中的<b>外資 + 自營商</b>（排除投信，沿用輝哥 Excel 慣例）。
    成本背景色：口數正負決定（<b style="background:#E1EEDB;padding:1px 4px">負→淡綠</b>、<b style="background:#FBC9C6;padding:1px 4px">正→淡紅</b>）。
    <b>賣權 PUT 一列規則反轉</b>（負→淡紅、正→淡綠，因 PUT 多空意義相反）。
    期貨「成本」單位點數；股期單位股價；選擇權單位權利金點數。
  </p>
</main>

<script src="/static/app.js"></script>
</body>
</html>
